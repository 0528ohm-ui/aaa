<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>설비 점검 입력폼</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.js"></script>
  <style>
    /* ══════════════════════════════════════
       기본 레이아웃
    ══════════════════════════════════════ */
    html { -webkit-text-size-adjust: 100%; }
    body {
      padding: 1em;
      padding-bottom: env(safe-area-inset-bottom);
      font-family: sans-serif;
      font-size: 5em;
      box-sizing: border-box;
      background: #f5f5f5;
    }
    h2 {
      font-size: 1em;
      margin-bottom: 0.8em;
      color: #333;
    }
    .form-group { margin-bottom: 1em; }
    label { display: block; margin-bottom: .3em; }
    input, select, textarea {
      width: 100%; padding: .5em; box-sizing: border-box;
    }
    select,
    input#checkDate.flatpickr-input,
    input[type="time"],
    textarea {
      height: 2em; font-size: 0.9em; padding: 0.4em;
    }

    /* ══════════════════════════════════════
       flatpickr 달력
    ══════════════════════════════════════ */
    .flatpickr-calendar.inline {
      width: calc(100% / 2.5) !important;
      transform: scale(2.5);
      transform-origin: top left;
      margin: 1em 0 35em 0;
      z-index: 1000;
    }
    @media (max-width: 600px) {
      .flatpickr-calendar.inline {
        width: calc(100% / 1.6) !important;
        transform: scale(1.6);
        margin: 1em 0 20em 0;
      }
    }
    .flatpickr-calendar.inline .flatpickr-day.has-marker { position: relative; }
    .flatpickr-calendar.inline .flatpickr-day.has-marker::after {
      content: "";
      position: absolute;
      bottom: 0.4em; left: 50%;
      transform: translateX(-50%);
      width: 0.8em; height: 0.8em;
      background: #FF4136;
      border-radius: 50%;
    }

    /* ══════════════════════════════════════
       체크리스트 항목 (OK/NG 라디오)
    ══════════════════════════════════════ */
    #checklist-container .form-group {
      display: flex; align-items: center; gap: 0.8em; margin-bottom: 1em;
    }
    #checklist-container .form-group > label:first-child {
      width: 12em; font-size: 0.9em;
    }
    #checklist-container input[type="radio"] {
      transform: scale(2); margin-right: 1em;
    }
    #checklist-container .form-group label:nth-of-type(2),
    #checklist-container .form-group label:nth-of-type(3) {
      font-size: 0.9em;
    }

    /* ══════════════════════════════════════
       숫자 직접 입력형 (조도)
    ══════════════════════════════════════ */
    #checklist-container .form-group.text-input {
      display: block;
      margin-bottom: 1.5em;
    }
    #checklist-container .form-group.text-input > label {
      font-size: 1em;
      margin-bottom: 0.4em;
      display: block;
    }
    #checklist-container .form-group.text-input input[type="number"] {
      width: 100%;
      height: 2em;
      font-size: 1em;
      padding: 0.4em;
      box-sizing: border-box;
    }

    /* ══════════════════════════════════════
       버튼 / 상태 메시지
    ══════════════════════════════════════ */
    button[type="submit"] {
      width: 100%; height: 3em; font-size: 1em;
      background: #1a73e8; color: #fff;
      border: none; border-radius: 4px;
      cursor: pointer;
    }
    button[type="submit"]:disabled { background: #aaa; cursor: not-allowed; }

    #status-msg {
      display: none;
      margin-top: 0.5em;
      font-size: 0.8em;
      padding: 0.5em;
      border-radius: 4px;
      text-align: center;
    }
    #status-msg.success { background: #d4edda; color: #155724; display: block; }
    #status-msg.error   { background: #f8d7da; color: #721c24; display: block; }

    /* ══════════════════════════════════════
       로딩 오버레이
    ══════════════════════════════════════ */
    #loading-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      font-size: 0.3em;
      color: #fff;
      font-weight: bold;
    }
    #loading-overlay.show { display: flex; }
  </style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div id="loading-overlay">데이터 불러오는 중…</div>

<form id="inspection-form" style="display:none;">
  <h2>설비 점검 입력</h2>

  <div class="form-group">
    <label for="checkDate">점검 날짜</label>
    <input type="text" id="checkDate" name="date" required>
  </div>
  <div class="form-group">
    <label for="checkTime">점검 시간</label>
    <input type="time" id="checkTime" name="time" required>
  </div>
  <div class="form-group">
    <label for="inspector">점검자</label>
    <select id="inspector" name="inspector" required>
      <option value="" disabled selected>선택하세요</option>
      <option>강병주</option>
      <option>김상기</option>
      <option>문수진</option>
      <option>오현민</option>
      <option>허미정</option>
    </select>
  </div>
  <div class="form-group">
    <label for="equipment">설비명</label>
    <select id="equipment" name="equipment" required>
      <option value="" disabled selected>선택하세요</option>
    </select>
  </div>

  <div id="checklist-container" class="form-group">
    <strong>체크리스트</strong><br>
  </div>

  <div class="form-group">
    <label for="notes">비고</label>
    <textarea id="notes" name="notes" rows="3"></textarea>
  </div>

  <button type="submit">저장하기</button>
  <div id="status-msg"></div>
</form>

<script>
/* ══════════════════════════════════════════════════════════════
   ★★★ Supabase 설정 — 아래 두 값을 실제 값으로 교체하세요 ★★★
══════════════════════════════════════════════════════════════ */
const SUPABASE_URL      = 'https://yimmmfuocifgherrgwze.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_7qy_eDgZHlx9C-trirsERQ_3MdvDqJA';
/* ══════════════════════════════════════════════════════════════ */

const SB_HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_ANON_KEY,
  'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
};

/* ─── 인증 (6개월 localStorage) ─── */
const PASSWORD = '2468';
const AUTH_KEY = 'auth-ok';

function isAuthValid() {
  const flag = localStorage.getItem(AUTH_KEY);
  const exp  = parseInt(localStorage.getItem(AUTH_KEY + '-exp') || 0, 10);
  if (flag === '1' && Date.now() < exp) return true;
  localStorage.removeItem(AUTH_KEY);
  localStorage.removeItem(AUTH_KEY + '-exp');
  return false;
}
function askPassword() {
  let pw;
  while (true) {
    pw = prompt('관리자 비밀번호를 입력하세요:');
    if (pw === null) { window.close(); return false; }
    if (pw === PASSWORD) {
      const exp = Date.now() + 183 * 24 * 60 * 60 * 1000;
      localStorage.setItem(AUTH_KEY, '1');
      localStorage.setItem(AUTH_KEY + '-exp', exp);
      return true;
    }
    alert('❌ 비밀번호가 틀렸습니다.');
  }
}
if (!isAuthValid() && !askPassword()) throw '인증 실패';
document.getElementById('inspection-form').style.display = 'block';

/* ─── Supabase API 헬퍼 ─── */

/** checklist 마스터 테이블 전체 조회 */
async function fetchChecklist() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/checklist?select=equipment,item,period&order=equipment.asc`,
    { headers: SB_HEADERS }
  );
  if (!res.ok) throw new Error('checklist 조회 실패: ' + res.status);
  return res.json(); // [{equipment, item, period}, ...]
}

/** inspection_log 에서 설비+항목별 마지막 날짜 조회 */
async function fetchLastDates() {
  // Supabase REST에서 GROUP BY 대신 전체 로그를 받아 JS에서 최대값 추출
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/inspection_log?select=equipment,item,date&order=date.desc`,
    { headers: SB_HEADERS }
  );
  if (!res.ok) throw new Error('inspection_log 조회 실패: ' + res.status);
  return res.json(); // [{equipment, item, date}, ...]
}

/** inspection_log INSERT (배열) */
async function insertRows(rows) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/inspection_log`,
    {
      method: 'POST',
      headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify(rows)
    }
  );
  if (!res.ok) {
    const msg = await res.text();
    throw new Error('저장 실패: ' + msg);
  }
  return true;
}

/** fullMapping 빌드 (GAS getFullMapping 대체) */
async function getFullMapping() {
  const [tplRows, logRows] = await Promise.all([fetchChecklist(), fetchLastDates()]);

  // 설비+항목 → 마지막 날짜 맵
  const lastDateMap = {};
  logRows.forEach(({ equipment, item, date }) => {
    const key = equipment + '|||' + item;
    if (!lastDateMap[key] || date > lastDateMap[key]) {
      lastDateMap[key] = date; // 'yyyy-MM-dd' 문자열 비교
    }
  });

  const mapping = {};
  tplRows.forEach(({ equipment, item, period }) => {
    mapping[equipment] = mapping[equipment] || [];
    const key = equipment + '|||' + item;
    mapping[equipment].push({
      item,
      period: Number(period),
      lastDate: lastDateMap[key] || null
    });
  });
  return mapping;
}

/* ─── 전역 상태 ─── */
let fullMapping = {};

/* ─── ISO 주차 ─── */
function getISOWeek(d) {
  const date = new Date(d.valueOf()), day = (date.getDay() + 6) % 7;
  date.setDate(date.getDate() - day + 3);
  const firstThu = date.valueOf();
  date.setMonth(0, 1);
  if (date.getDay() !== 4) {
    date.setMonth(0, 1 + ((4 - date.getDay()) + 7) % 7);
  }
  return 1 + Math.round((firstThu - date) / (7 * 24 * 3600 * 1000));
}

/* ─── DOM 참조 ─── */
const form      = document.getElementById('inspection-form');
const dateInput = document.getElementById('checkDate');
const timeInput = document.getElementById('checkTime');
const eqSelect  = document.getElementById('equipment');
const container = document.getElementById('checklist-container');
const statusMsg = document.getElementById('status-msg');
const overlay   = document.getElementById('loading-overlay');

/* ─── 설비 드롭다운 구성 ─── */
function buildEquipmentOptions() {
  eqSelect.innerHTML = '<option value="" disabled selected>선택하세요</option>';
  Object.keys(fullMapping).forEach(eq => {
    const opt = document.createElement('option');
    opt.value = eq;
    opt.textContent = eq;
    eqSelect.appendChild(opt);
  });
}

/* ─── 설비 옵션 필터 (기간 초과 항목 없으면 숨김) ─── */
function filterEquipmentOptions() {
  const selDate = new Date(dateInput.value + 'T00:00:00');
  Array.from(eqSelect.options).forEach(opt => {
    const eq = opt.value; if (!eq) return;
    const dueCount = (fullMapping[eq] || []).filter(({ period, lastDate }) => {
      if (!lastDate) return true;
      const ld   = new Date(lastDate + 'T00:00:00');
      const diff = Math.floor((selDate - ld) / (1000 * 60 * 60 * 24));
      if (diff < 0) return false;
      if (period === 1)  return diff >= 1;
      if (period === 7)  return getISOWeek(selDate) !== getISOWeek(ld);
      return selDate.getMonth() !== ld.getMonth();
    }).length;
    const hide = (dueCount === 0);
    opt.disabled = hide; opt.hidden = hide;
    opt.style.display = hide ? 'none' : '';
  });

  const cur = eqSelect.value;
  if (cur) {
    const o = eqSelect.querySelector(`option[value="${cur}"]`);
    if (o && o.disabled) {
      eqSelect.value = '';
      container.innerHTML = '<strong>체크리스트</strong><br>';
    }
  }
}

/* ─── 체크리스트 렌더링 ─── */
function updateChecklist() {
  container.innerHTML = '<strong>체크리스트</strong><br>';
  const eq = eqSelect.value; if (!eq) return;

  /* ① 측정실 온/습도 — 드롭다운 */
  if (eq === '측정실 온/습도') {
    container.innerHTML += `
      <div class="form-group">
        <label>온도</label>
        <select name="values" data-item="온도">
          ${[20,21,22,23,24].map(v => `<option>${v}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>습도</label>
        <select name="values" data-item="습도">
          ${Array.from({length:21},(_,i)=>40+i).map(v=>`<option>${v}</option>`).join('')}
        </select>
      </div>`;
    return;
  }

  /* ② 경도 마스터샘플체크 — 드롭다운 */
  if (eq === '경도 마스터샘플체크') {
    container.innerHTML += `
      <div class="form-group">
        <label>경도</label>
        <select name="values" data-item="경도">
          ${[701.9,702.0,702.1].map(v=>`<option>${v}</option>`).join('')}
        </select>
      </div>`;
    return;
  }

  /* ③ 조도 — 숫자 직접 입력 */
  if (eq === '조도') {
    const illuminanceItems = [
      { label: 'B동 49호기 앞',   min: 300 },
      { label: 'B동 GP-12',       min: 600 },
      { label: 'B동 47호기 앞',   min: 300 },
      { label: 'B동 40호기 앞',   min: 300 },
      { label: 'B동 37호기 앞',   min: 300 },
      { label: 'B동 41호기 앞',   min: 300 },
      { label: 'C동 39호기 앞',   min: 300 },
      { label: 'C동 1호기 앞',    min: 300 },
      { label: 'C동 34호기 앞',   min: 300 },
      { label: 'C동 36호기 앞',   min: 300 },
      { label: 'C동 38호기 앞',   min: 300 },
      { label: 'C동 43호기 앞',   min: 300 },
      { label: '2층 D검사실',     min: 600 },
      { label: '2층 C검사실',     min: 600 },
      { label: '2층 A검사실',     min: 600 },
      { label: '2층 B검사실',     min: 600 },
      { label: '2층 세척실',      min: 300 },
      { label: '측정실 정반',     min: 600 },
      { label: '측정실 수동3차원',min: 600 },
      { label: '측정실 자동3차원',min: 600 },
    ];
    illuminanceItems.forEach(({ label, min }) => {
      container.innerHTML += `
        <div class="form-group text-input">
          <label for="illu-${label}">${label}</label>
          <input
            type="number"
            id="illu-${label}"
            name="values"
            data-item="${label}"
            min="${min}"
            step="0.1"
            placeholder="${min} 이상 입력"
            required
          >
        </div>`;
    });
    return;
  }

  /* ④ 일반 OK/NG 라디오 */
  const selDate = new Date(dateInput.value + 'T00:00:00');
  (fullMapping[eq] || []).forEach(({ item, period, lastDate }) => {
    let due = !lastDate;
    if (lastDate) {
      const ld   = new Date(lastDate + 'T00:00:00');
      const diff = Math.floor((selDate - ld) / (1000 * 60 * 60 * 24));
      if (period === 1)      due = diff >= 1;
      else if (period === 7) due = getISOWeek(selDate) !== getISOWeek(ld);
      else                   due = selDate.getMonth() !== ld.getMonth();
    }
    if (!due) return;
    const key = item.replace(/\s+/g, '_');
    container.innerHTML += `
      <div class="form-group">
        <label>${item}</label>
        <label>
          <input type="radio" name="result_${key}" data-item="${item}" value="OK" checked required> OK
        </label>
        <label>
          <input type="radio" name="result_${key}" data-item="${item}" value="NG"> NG
        </label>
      </div>`;
  });
}

/* ─── 상태 메시지 ─── */
function showStatus(msg, type) {
  statusMsg.textContent = msg;
  statusMsg.className = type; // 'success' | 'error'
  setTimeout(() => { statusMsg.className = ''; }, 4000);
}

/* ─── DOMContentLoaded ─── */
window.addEventListener('DOMContentLoaded', async () => {
  const now = new Date();
  dateInput.value = now.toISOString().slice(0, 10);
  timeInput.value = now.toTimeString().slice(0, 5);

  /* fullMapping 초기 로드 */
  overlay.classList.add('show');
  try {
    fullMapping = await getFullMapping();
  } catch (e) {
    alert('⚠️ 데이터 로드 실패:\n' + e.message);
  } finally {
    overlay.classList.remove('show');
  }

  buildEquipmentOptions();

  /* flatpickr 달력 */
  flatpickr('#checkDate', {
    inline: true,
    dateFormat: 'Y-m-d',
    defaultDate: now,
    onDayCreate(_, __, ___, dayElem) {
      const d = dayElem.dateObj;
      const hasDue = Object.values(fullMapping).some(a =>
        a.some(({ lastDate, period }) => {
          if (!lastDate) return true;
          const ld   = new Date(lastDate + 'T00:00:00');
          const diff = Math.floor((d - ld) / (1000 * 60 * 60 * 24));
          if (period === 1) return diff >= 1;
          if (period === 7) return diff >= 7;
          return diff >= 30;
        })
      );
      if (hasDue) dayElem.classList.add('has-marker');
    },
    onChange() {
      filterEquipmentOptions();
      updateChecklist();
    }
  });

  filterEquipmentOptions();
  updateChecklist();

  eqSelect.addEventListener('change', () => {
    filterEquipmentOptions();
    updateChecklist();
  });

  /* ─── 폼 제출 ─── */
  const btn = form.querySelector('button[type="submit"]');
  let busy = false;
  const numericEquipments = ['측정실 온/습도', '경도 마스터샘플체크', '조도'];

  form.addEventListener('submit', async e => {
    e.preventDefault();
    if (busy) return;

    const eq        = eqSelect.value;
    const date      = dateInput.value;
    const time      = timeInput.value;
    const inspector = form.inspector.value;
    const notes     = form.notes.value;

    /* 페이로드 구성 */
    let rows;
    if (numericEquipments.includes(eq)) {
      const inputs = container.querySelectorAll('select[name="values"], input[name="values"]');
      rows = Array.from(inputs).map(el => ({
        date, time, equipment: eq,
        item: el.dataset.item,
        value: el.value,
        inspector, notes
      }));
    } else {
      const checked = container.querySelectorAll('input[type="radio"]:checked');
      rows = Array.from(checked).map(r => ({
        date, time, equipment: eq,
        item: r.dataset.item,
        value: r.value,
        inspector, notes
      }));
    }

    if (!rows.length) {
      showStatus('⚠️ 점검 항목이 없습니다.', 'error');
      return;
    }

    busy = true;
    btn.disabled = true;
    btn.textContent = '저장 중…';
    overlay.classList.add('show');

    try {
      await insertRows(rows);

      /* 저장 후 fullMapping 재조회 */
      fullMapping = await getFullMapping();

      /* 폼 초기화 (날짜·시간·점검자 유지) */
      const prevIns  = form.inspector.value;
      const prevDate = dateInput.value;
      const prevTime = timeInput.value;
      form.reset();
      form.inspector.value = prevIns;
      dateInput.value      = prevDate;
      timeInput.value      = prevTime;

      filterEquipmentOptions();
      container.innerHTML = '<strong>체크리스트</strong><br>';
      updateChecklist();

      showStatus('✅ 저장 완료!', 'success');
    } catch (err) {
      showStatus('❌ 오류: ' + err.message, 'error');
    } finally {
      busy = false;
      btn.disabled = false;
      btn.textContent = '저장하기';
      overlay.classList.remove('show');
    }
  });
});
</script>
</body>
</html>
